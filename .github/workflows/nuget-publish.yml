name: 📦 WebFlux NuGet Package Build & Publish

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'src/WebFlux/**/*.cs'
      - 'tests/**/*.cs'
      - '.github/workflows/nuget-publish.yml'
  workflow_dispatch:
    inputs:
      force_publish:
        description: 'Force publish to NuGet.org'
        required: false
        type: boolean
        default: false

env:
  DOTNET_VERSION: '10.0.x'
  BUILD_CONFIGURATION: 'Release'

jobs:
  detect-version:
    name: 🔍 Detect Version Changes
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract-version.outputs.version }}
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 📊 Extract Version from Directory.Build.props
        id: extract-version
        run: |
          VERSION=$(grep -oP '(?<=<VersionPrefix>)[^<]*' Directory.Build.props)
          VERSION_SUFFIX=$(grep -oP '(?<=<VersionSuffix>)[^<]*' Directory.Build.props || echo "")

          if [ -n "$VERSION_SUFFIX" ] && [ "$VERSION_SUFFIX" != "" ]; then
            FULL_VERSION="${VERSION}-${VERSION_SUFFIX}"
          else
            FULL_VERSION="$VERSION"
          fi

          echo "Extracted VersionPrefix: $VERSION"
          echo "Extracted VersionSuffix: $VERSION_SUFFIX"
          echo "Full version: $FULL_VERSION"
          echo "version=$FULL_VERSION" >> $GITHUB_OUTPUT

  build:
    name: 🔨 Build & Test Solution
    runs-on: ubuntu-latest
    needs: detect-version
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📦 Restore Dependencies
        run: dotnet restore WebFlux.slnx

      - name: 🔨 Build Solution
        run: dotnet build WebFlux.slnx --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

      - name: 🧪 Run Fast Tests (excluding Performance and LongRunning)
        run: dotnet test tests/WebFlux.Tests/WebFlux.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity normal --filter "Category!=Performance&Category!=LongRunning"

      - name: ℹ️ Test Execution Info
        run: |
          echo "✅ Fast tests completed successfully"
          echo "⏭️ Performance and LongRunning tests are excluded from CI for efficiency"
          echo "💡 To run all tests locally: ./scripts/full-test.ps1 -IncludePerformance -IncludeLongRunning"

  publish:
    name: 🚀 Build & Publish to NuGet.org
    runs-on: ubuntu-latest
    needs: [detect-version, build]
    if: github.ref == 'refs/heads/main' || github.event.inputs.force_publish == 'true'
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📦 Restore Dependencies
        run: dotnet restore WebFlux.slnx

      - name: 📦 Create NuGet Package
        run: |
          dotnet pack src/WebFlux/WebFlux.csproj \
            --configuration Release \
            --output nupkg/ \
            --no-restore

      - name: 📋 Verify Packages
        run: ls -la nupkg/

      - name: 🚀 Publish to NuGet.org
        run: |
          for package in nupkg/*.nupkg; do
            echo "Publishing $package..."
            dotnet nuget push "$package" \
              --api-key ${{ secrets.NUGET_API_KEY }} \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate \
              --no-symbols
          done
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

      - name: 🏷️ Create Git Tag
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          TAG_NAME="v${{ needs.detect-version.outputs.version }}"

          if ! git tag -l "$TAG_NAME" | grep -q "$TAG_NAME"; then
            git tag "$TAG_NAME"
            echo "Created local tag $TAG_NAME"
          else
            echo "Tag $TAG_NAME already exists locally"
          fi

          if git push origin "$TAG_NAME" 2>&1 | grep -q "already exists"; then
            echo "Tag $TAG_NAME already exists on remote, skipping"
            exit 0
          else
            echo "Pushed tag $TAG_NAME to remote"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-completion:
    name: 📢 Notify Completion
    runs-on: ubuntu-latest
    needs: [detect-version, publish]
    if: always()
    steps:
      - name: 🎉 Success Notification
        if: needs.publish.result == 'success'
        run: |
          echo "🎉 Successfully published WebFlux v${{ needs.detect-version.outputs.version }} to NuGet.org!"
          echo "📦 Package URL: https://www.nuget.org/packages/WebFlux/${{ needs.detect-version.outputs.version }}"

      - name: ❌ Failure Notification
        if: needs.publish.result != 'success'
        run: |
          echo "❌ Failed to publish WebFlux v${{ needs.detect-version.outputs.version }}"
          echo "Check the workflow logs for detailed error information"
          exit 1
